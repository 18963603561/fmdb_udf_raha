# Raha 轻量化工程默认配置。
raha.algorithm.version=raha-1.0.0
raha.sampling.labeling-budget=20
raha.sampling.maximum-labeling-budget=200
raha.sampling.random-seed=20260717
raha.feature.maximum-dictionary-values=5000
raha.model.classifier-type=LOGISTIC_REGRESSION
raha.model.maximum-iterations=200
raha.model.regularization=0.01
raha.model.default-threshold=0.5
raha.storage.database=dw
raha.storage.format=ORC
raha.storage.root=/fmdb/raha/
raha.storage.partition-time-zone=Asia/Shanghai
