# Raha 任务级默认配置。
raha.job.save-intermediate=false
raha.job.random-seed=20260714
raha.job.result-retention-days=30

# 策略范围、数量和执行限制。
raha.strategy.families=OD,PVD,RVD
raha.strategy.max-count=1000
raha.strategy.included-columns=
raha.strategy.excluded-columns=
raha.strategy.max-rvd-column-pairs=500
raha.strategy.timeout-millis=300000
raha.strategy.filtering-enabled=false
raha.strategy.included-types=
raha.strategy.excluded-types=
raha.strategy.priorities=

# 策略计划生成参数和默认优先级。
raha.strategy.od.low-frequency-ratio=0.01
raha.strategy.od.minimum-numeric-count=3
raha.strategy.od.z-threshold=3.0
raha.strategy.od.minimum-quantile-count=4
raha.strategy.od.iqr-multiplier=1.5
raha.strategy.pvd.minority-ratio=0.1
raha.strategy.pvd.format-type=AUTO
raha.strategy.pvd.format-min-ratio=0.8
raha.strategy.pvd.placeholders=N/A|NULL|NONE|UNKNOWN|-|--|?
raha.strategy.priority.od-low-frequency=100
raha.strategy.priority.od-numeric-distance=110
raha.strategy.priority.od-quantile=120
raha.strategy.priority.pvd-character-set=200
raha.strategy.priority.pvd-length=210
raha.strategy.priority.pvd-null-placeholder=220
raha.strategy.priority.pvd-type-format=230
raha.strategy.priority.rvd-one-to-many=300

# 值规范化、上下文和画像配置。
raha.feature.trim-value=true
raha.feature.lower-case-value=false
raha.feature.normalize-width=true
raha.feature.context-enabled=true
raha.feature.remove-constant=true
raha.feature.max-count=10000
raha.feature.rare-value-ratio=0.01
raha.profile.max-value-frequency-count=20
raha.profile.quantile-accuracy=10000

# 列级模型、基础检测和逻辑回归配置。
raha.model.classifier-type=WEIGHTED_RULE
raha.model.threshold=0.5
raha.model.fallback-enabled=true
raha.model.context-weight=0.2
raha.model.strategy-family-weights=OD:0.8,PVD:0.7,RVD:1.0,KBVD:1.0,TFIDF:0.5
raha.model.default-strategy-family-weight=0.5
raha.model.context-signal.rare-weight=1.0
raha.model.context-signal.rvd-conflict-weight=1.0
raha.model.context-signal.null-weight=0.5
raha.model.context-signal.blank-weight=0.5
raha.model.context-signal.mixed-weight=0.5
raha.model.logistic.class-balance-enabled=true
raha.model.logistic.max-iterations=100
raha.model.logistic.regularization=0.0
raha.model.logistic.elastic-net=0.0

# 聚类、采样和标签传播配置。
raha.clustering.distance-metric=COSINE
raha.clustering.target-cluster-count=2
raha.clustering.max-sample-count=500
raha.sampling.labeling-budget=20
raha.sampling.clustering-based=true
raha.sampling.review-enabled=false
raha.sampling.task-ttl-millis=604800000
raha.sampling.coverage-score-exponent-cap=20.0
raha.label.propagated-weight=0.5
raha.label.minimum-majority-ratio=0.5
raha.label.max-direct-weight-ratio=0.5

# Spark 并发、广播、缓存和失败恢复配置。
raha.resource.max-parallel-strategies=4
raha.resource.max-parallel-columns=4
raha.resource.broadcast-threshold-bytes=10485760
raha.resource.cache-storage-level=MEMORY_AND_DISK
raha.resource.cache-threshold-bytes=536870912
raha.resource.stage-timeout-millis=1800000
raha.failure.fail-fast=false
raha.failure.max-failed-strategy-ratio=0.1
raha.failure.max-retry-count=1

# UDF 注册和请求边界。
raha.udf.train-function=F_DW_RAHATRAIN
raha.udf.detect-function=F_DW_RAHADETECT
raha.udf.sample-function=F_DW_RAHASAMPLE
raha.udf.max-request-length=65536

# 结果值保护默认策略。
raha.security.result.mode=MASKED
raha.security.result.all-columns-sensitive=true
raha.security.result.sensitive-columns=
raha.security.result.visible-prefix=1
raha.security.result.visible-suffix=1

# 中间结果和检测结果建议保留周期。
raha.retention.intermediate-days=7
raha.retention.detection-days=90

# 标准性能基准数据集。
raha.performance.benchmark.names=small-low-error,medium-normal-error,large-high-error,wide-normal-error
raha.performance.benchmark.small-low-error.scale=SMALL
raha.performance.benchmark.small-low-error.rows=100000
raha.performance.benchmark.small-low-error.columns=10
raha.performance.benchmark.small-low-error.error-rate=0.001
raha.performance.benchmark.small-low-error.partitions=8
raha.performance.benchmark.small-low-error.seed=101
raha.performance.benchmark.medium-normal-error.scale=MEDIUM
raha.performance.benchmark.medium-normal-error.rows=1000000
raha.performance.benchmark.medium-normal-error.columns=20
raha.performance.benchmark.medium-normal-error.error-rate=0.01
raha.performance.benchmark.medium-normal-error.partitions=64
raha.performance.benchmark.medium-normal-error.seed=202
raha.performance.benchmark.large-high-error.scale=LARGE
raha.performance.benchmark.large-high-error.rows=10000000
raha.performance.benchmark.large-high-error.columns=30
raha.performance.benchmark.large-high-error.error-rate=0.05
raha.performance.benchmark.large-high-error.partitions=400
raha.performance.benchmark.large-high-error.seed=303
raha.performance.benchmark.wide-normal-error.scale=WIDE
raha.performance.benchmark.wide-normal-error.rows=1000000
raha.performance.benchmark.wide-normal-error.columns=200
raha.performance.benchmark.wide-normal-error.error-rate=0.01
raha.performance.benchmark.wide-normal-error.partitions=160
raha.performance.benchmark.wide-normal-error.seed=404

# 生产容量分档和分区计算规则。
raha.performance.partition.target-bytes=134217728
raha.performance.partition.target-rows=250000
raha.performance.partition.minimum=8
raha.performance.partition.maximum=2000
raha.performance.capacity.small.max-rows=1000000
raha.performance.capacity.small.max-columns=50
raha.performance.capacity.medium.max-rows=10000000
raha.performance.capacity.medium.max-columns=100
raha.performance.capacity.large.max-rows=100000000
raha.performance.capacity.large.max-columns=200

# 各容量分档资源建议。
raha.performance.band.small.strategy-concurrency=4
raha.performance.band.small.column-concurrency=2
raha.performance.band.small.max-rvd-pairs=100
raha.performance.band.small.cache-enabled=false
raha.performance.band.small.storage-level=MEMORY_AND_DISK
raha.performance.band.small.intermediate-retention-days=7
raha.performance.band.small.detection-retention-days=90
raha.performance.band.medium.strategy-concurrency=8
raha.performance.band.medium.column-concurrency=4
raha.performance.band.medium.max-rvd-pairs=300
raha.performance.band.medium.cache-enabled=true
raha.performance.band.medium.storage-level=MEMORY_AND_DISK_SER
raha.performance.band.medium.intermediate-retention-days=7
raha.performance.band.medium.detection-retention-days=90
raha.performance.band.large.strategy-concurrency=12
raha.performance.band.large.column-concurrency=6
raha.performance.band.large.max-rvd-pairs=500
raha.performance.band.large.cache-enabled=true
raha.performance.band.large.storage-level=MEMORY_AND_DISK_SER
raha.performance.band.large.intermediate-retention-days=5
raha.performance.band.large.detection-retention-days=180
raha.performance.band.extra-large.strategy-concurrency=16
raha.performance.band.extra-large.column-concurrency=8
raha.performance.band.extra-large.max-rvd-pairs=500
raha.performance.band.extra-large.cache-enabled=true
raha.performance.band.extra-large.storage-level=DISK_ONLY
raha.performance.band.extra-large.intermediate-retention-days=3
raha.performance.band.extra-large.detection-retention-days=180
