# Raha 任务级默认配置。
# 默认任务运行时使用的物理网关模式；IN_MEMORY 适合开发测试，FMDB 要求已配置 Spark Catalog。
raha.runtime.storage-mode=FMDB

# Raha UDF 输出产物、本地降级发布和 HDFS 导出目录。
raha.output.work-dir=/tmp/raha-udf-output
raha.output.local-web-root=/tmp/raha-udf-web
raha.output.hdfs-export-path=/fmdb/detection/output/
raha.output.web-base-url=

# Raha UDF 标注上传和模型集合默认目录。
raha.annotation.upload-dir=/fmdb/detection/annotation/
raha.model.base-path=/fmdb/detection/model/

# 是否启用 FMDB 物理表持久化总开关。
# 关闭后不初始化默认表，任务结果只在当前执行上下文中使用。
# 可选值：true、false；默认值：true。
raha.persistence.enabled=true
# 是否在 FMDB 网关初始化时自动创建不存在的默认表。
# 可选值：true、false；默认值：true。
raha.persistence.schema.auto-create=true
# 自动建表使用的类路径 SQL 资源。
# 可选值：类路径下可读取的 SQL 文件；默认值：db/fmdb/raha-fmdb-schema.sql。
raha.persistence.schema.resource=db/fmdb/raha-fmdb-schema.sql

# 九张 FMDB 物理表的独立入库开关。
# FMDB 标准物理表全局写入模式。DIRECT_APPEND 不读取历史主键直接追加；IDEMPOTENT_BY_KEY 保留历史幂等去重。
raha.persistence.write-mode=DIRECT_APPEND
# 采样记录是人工标注和后续训练关联的依据，默认保存。
raha.persistence.table.sample-record.enabled=true
# 用户标注是不可重新计算的业务数据，默认保存。
raha.persistence.table.annotation-record.enabled=true
raha.persistence.table.snapshot-checkpoint.enabled=true
# 列画像、策略计划和特征字典是训练与模型加载依赖，默认保存。
raha.persistence.table.training-column-artifact.enabled=false
# 全量训练单元格可重新计算且数据量大，默认不保存。
raha.persistence.table.training-cell.enabled=false
# 最终入模样本用于模型复现和快速重训，默认保存。
raha.persistence.table.training-example.enabled=false
# 模型需要跨任务加载和预测，默认保存。
raha.persistence.table.model-artifact.enabled=true
# 错误检测结果用于查询、导出和审计，默认保存。
raha.persistence.table.detection-result.enabled=true
# 任务状态用于幂等控制和结果查询，默认保存。
raha.persistence.table.job-run.enabled=true
# 阶段尝试用于任务结果查询和失败定位，FMDB 运行时默认保存。
raha.persistence.table.job-stage-attempt.enabled=true

# 训练列级产物表中五类 JSON 产物的独立入库开关。
# 列画像计算开销较高且可被重复训练复用，默认保存。
raha.persistence.column-artifact.profile.enabled=true
# 策略计划是模型解释和版本校验依赖，默认保存。
raha.persistence.column-artifact.strategy-plan.enabled=true
# 特征字典是模型加载和预测的必要依赖，默认保存。
raha.persistence.column-artifact.feature-dictionary.enabled=true
# 聚类摘要可重新计算且不参与模型加载，默认不保存。
raha.persistence.column-artifact.cluster-summary.enabled=false
# 标签传播摘要可重新计算且不参与模型加载，默认不保存。
raha.persistence.column-artifact.propagation-summary.enabled=false

# 聚类、采样和模型计算使用的随机种子。
# 可选值：符合该配置约束的数值；默认值：20260714。
raha.job.random-seed=20260714

# 策略范围、数量和执行限制。
# 默认启用的策略族，使用英文逗号分隔。
# 可选值：策略族名称集合；默认值：OD,PVD,RVD。
raha.strategy.families=OD,PVD
# 单个任务允许生成的最大策略数量。
# 可选值：符合该配置约束的数值；默认值：1000。
raha.strategy.max-count=1000
# 参与策略生成的字段白名单，空值表示不限制。
# 可选值：空或按配置格式填写；默认值：空。
raha.strategy.included-columns=
# 排除策略生成的字段黑名单，空值表示不排除。
# 可选值：空或按配置格式填写；默认值：空。
raha.strategy.excluded-columns=
# RVD 策略允许枚举的最大有向列对数量。
# 可选值：符合该配置约束的数值；默认值：500。
raha.strategy.max-rvd-column-pairs=500
# 单个策略的执行超时时间，单位为毫秒。
# 可选值：符合该配置约束的数值；默认值：300000。
raha.strategy.timeout-millis=300000
# 是否启用历史策略过滤。
# 可选值：true、false；默认值：false。
raha.strategy.filtering-enabled=false
# 允许执行的策略类型白名单，空值表示不限制。
# 可选值：空或按配置格式填写；默认值：空。
raha.strategy.included-types=
# 禁止执行的策略类型黑名单，空值表示不排除。
# 可选值：空或按配置格式填写；默认值：空。
raha.strategy.excluded-types=
# 任务级策略优先级覆盖映射，格式为策略类型冒号整数。
# 可选值：空或按配置格式填写；默认值：空。
raha.strategy.priorities=

# 策略计划生成参数和默认优先级。
# OD 低频值相对列数据量的比例阈值。
# 可选值：符合该配置约束的数值；默认值：0.01。
raha.strategy.od.low-frequency-ratio=0.01
# OD 数值距离策略要求的最小数值样本数。
# 可选值：符合该配置约束的数值；默认值：3。
raha.strategy.od.minimum-numeric-count=3
# OD 数值距离策略使用的标准差倍数阈值。
# 可选值：符合该配置约束的数值；默认值：3.0。
raha.strategy.od.z-threshold=3.0
# OD 四分位策略要求的最小样本数。
# 可选值：符合该配置约束的数值；默认值：4。
raha.strategy.od.minimum-quantile-count=4
# OD 四分位距计算使用的倍数。
# 可选值：符合该配置约束的数值；默认值：1.5。
raha.strategy.od.iqr-multiplier=1.5
# PVD 少数模式占比阈值。
# 可选值：符合该配置约束的数值；默认值：0.1。
raha.strategy.pvd.minority-ratio=0.1
# PVD 格式识别模式，支持自动识别或指定模式。
# 可选值：AUTO 或支持的格式模式；默认值：AUTO。
raha.strategy.pvd.format-type=AUTO
# PVD 格式被认定有效所需的最小适用比例。
# 可选值：符合该配置约束的数值；默认值：0.8。
raha.strategy.pvd.format-min-ratio=0.8
# PVD 识别为空值或特殊值的占位符，使用竖线分隔。
# 可选值：空或按配置格式填写；默认值：N/A|NULL|NONE|UNKNOWN|-|--|?。
raha.strategy.pvd.placeholders=N/A|NULL|NONE|UNKNOWN|-|--|?
# OD 低频策略的默认优先级。
# 可选值：符合该配置约束的数值；默认值：100。
raha.strategy.priority.od-low-frequency=100
# OD 数值距离策略的默认优先级。
# 可选值：符合该配置约束的数值；默认值：110。
raha.strategy.priority.od-numeric-distance=110
# OD 四分位策略的默认优先级。
# 可选值：符合该配置约束的数值；默认值：120。
raha.strategy.priority.od-quantile=120
# PVD 字符集策略的默认优先级。
# 可选值：符合该配置约束的数值；默认值：200。
raha.strategy.priority.pvd-character-set=200
# PVD 长度策略的默认优先级。
# 可选值：符合该配置约束的数值；默认值：210。
raha.strategy.priority.pvd-length=210
# PVD 空值占位策略的默认优先级。
# 可选值：符合该配置约束的数值；默认值：220。
raha.strategy.priority.pvd-null-placeholder=220
# PVD 类型格式策略的默认优先级。
# 可选值：符合该配置约束的数值；默认值：230。
raha.strategy.priority.pvd-type-format=230
# RVD 一对多策略的默认优先级。
# 可选值：符合该配置约束的数值；默认值：300。
raha.strategy.priority.rvd-one-to-many=300

# 值规范化、上下文和画像配置。
# 是否去除输入值首尾空白。
# 可选值：true、false；默认值：true。
raha.feature.trim-value=true
# 是否将文本值统一转换为小写。
# 可选值：true、false；默认值：false。
raha.feature.lower-case-value=false
# 是否执行全角半角等字符宽度规范化。
# 可选值：true、false；默认值：true。
raha.feature.normalize-width=true
# 是否生成上下文特征。
# 可选值：true、false；默认值：true。
raha.feature.context-enabled=true
# 是否删除常量特征。
# 可选值：true、false；默认值：true。
raha.feature.remove-constant=true
# 单列允许生成的最大特征数量。
# 可选值：符合该配置约束的数值；默认值：10000。
raha.feature.max-count=10000
# 稀有值的频率比例阈值。
# 可选值：符合该配置约束的数值；默认值：0.01。
raha.feature.rare-value-ratio=0.01
# 画像中保留的高频值哈希摘要数量上限。
# 可选值：符合该配置约束的数值；默认值：20。
raha.profile.max-value-frequency-count=20
# Spark 近似分位数计算精度。
# 可选值：符合该配置约束的数值；默认值：10000。
raha.profile.quantile-accuracy=10000

# 列级模型、基础检测和逻辑回归配置。
# 默认使用的分类器类型。
# DECISION_TREE 和 GBT 当前未接入训练器；生产默认使用 Spark 逻辑回归。
# 可选值：WEIGHTED_RULE、LOGISTIC_REGRESSION、DECISION_TREE、GBT；默认值：LOGISTIC_REGRESSION。
raha.model.classifier-type=LOGISTIC_REGRESSION
# 判定疑似错误的分数阈值。
# 可选值：符合该配置约束的数值；默认值：0.5。
raha.model.threshold=0.5
# 模型不可用时是否允许降级为规则模型，生产默认禁止静默降级。
# 可选值：true、false；默认值：false。
raha.model.fallback-enabled=false
# 是否启用模型训练质量门禁。
# 可选值：true、false；默认值：true。
raha.model.quality-gate.enabled=true
# 模型训练分数允许的最小标准差。
# 可选值：大于等于零的小数；默认值：0.000001。
raha.model.quality-gate.minimum-score-stddev=0.000001
# 模型预测正例比例允许的上限，下限使用一减该值。
# 可选值：大于 0.5 且小于 1 的小数；默认值：0.98。
raha.model.quality-gate.maximum-positive-ratio=0.98
# 模型训练集 F1 的最低门槛，最终发布仍需使用独立保留集评估。
# 可选值：零到一之间的小数；默认值：0.0。
raha.model.quality-gate.minimum-f1=0.0
# 上下文信号参与总体评分的融合权重。
# 可选值：符合该配置约束的数值；默认值：0.2。
raha.model.context-weight=0.2
# 各策略族的可靠度权重，格式为策略族冒号小数。
# 可选值：空或按配置格式填写；默认值：OD:0.8,PVD:0.7,RVD:1.0,KBVD:1.0,TFIDF:0.5。
raha.model.strategy-family-weights=OD:0.8,PVD:0.7,RVD:1.0,KBVD:1.0,TFIDF:0.5
# 未单独配置策略族时使用的默认可靠度权重。
# 可选值：符合该配置约束的数值；默认值：0.5。
raha.model.default-strategy-family-weight=0.5
# 稀有值上下文信号权重。
# 可选值：符合该配置约束的数值；默认值：1.0。
raha.model.context-signal.rare-weight=1.0
# RVD 冲突上下文信号权重。
# 可选值：符合该配置约束的数值；默认值：1.0。
raha.model.context-signal.rvd-conflict-weight=1.0
# 空值上下文信号权重。
# 可选值：符合该配置约束的数值；默认值：0.5。
raha.model.context-signal.null-weight=0.5
# 空白值上下文信号权重。
# 可选值：符合该配置约束的数值；默认值：0.5。
raha.model.context-signal.blank-weight=0.5
# 混合类型上下文信号权重。
# 可选值：符合该配置约束的数值；默认值：0.5。
raha.model.context-signal.mixed-weight=0.5
# 是否启用逻辑回归类别平衡。
# 可选值：true、false；默认值：true。
raha.model.logistic.class-balance-enabled=true
# 逻辑回归训练的最大优化迭代次数。
# 可选值：符合该配置约束的数值；默认值：100。
raha.model.logistic.max-iterations=100
# 逻辑回归总正则化参数。
# 可选值：符合该配置约束的数值；默认值：0.0。
raha.model.logistic.regularization=0.0
# 逻辑回归弹性网络中的 L1 比例。
# 可选值：符合该配置约束的数值；默认值：0.0。
raha.model.logistic.elastic-net=0.0
# 聚类、采样和标签传播配置。
# 列聚类使用的距离度量。
# 可选值：支持的距离度量名称；默认值：COSINE。
raha.clustering.distance-metric=COSINE
# 列聚类具体提供方，可使用 AUTO、实现名或短路名。
# 可选值：AUTO、SmileHierarchicalColumnClusterer、ScalableColumnClusterer、SparkKMeansColumnClusterer。
# AUTO 表示单列样本数不超过精确上限时使用 Smile 精确聚类，超过后使用 Spark KMeans 大样本聚类。
# 默认值：AUTO。
raha.clustering.provider=AUTO
# 每列聚类的目标簇数量。
# 可选值：符合该配置约束的数值；默认值：100。
raha.clustering.target-cluster-count=100
# 进入精确层次聚类的最大样本数量。
# 可选值：符合该配置约束的数值；默认值：5000。
raha.clustering.max-sample-count=5000
# 单轮主动标注允许使用的最大元组数。
# 可选值：符合该配置约束的数值；默认值：20。
raha.sampling.labeling-budget=20
# 是否启用基于聚类覆盖的采样。
# 可选值：true、false；默认值：true。
raha.sampling.clustering-based=true
# 是否允许复核已经标注的元组。
# 可选值：true、false；默认值：false。
raha.sampling.review-enabled=false
# 标注任务有效期，单位为毫秒，默认约 7 天。
# 可选值：符合该配置约束的数值；默认值：604800000。
raha.sampling.task-ttl-millis=604800000
# 覆盖分数进入指数函数计算前的最大值。
# 可选值：符合该配置约束的数值；默认值：20.0。
raha.sampling.coverage-score-exponent-cap=20.0
# 传播标签允许使用的最大基础权重。
# 可选值：符合该配置约束的数值；默认值：0.5。
raha.label.propagated-weight=0.5
# 标签传播所需的最低多数比例。
# 可选值：符合该配置约束的数值；默认值：0.5。
raha.label.minimum-majority-ratio=0.5
# 传播标签权重相对于直接标签权重的最大比例。
# 可选值：符合该配置约束的数值；默认值：0.5。
raha.label.max-direct-weight-ratio=0.5

# Spark 并发、广播、缓存和失败恢复配置。
# 策略并发执行上限。
# 可选值：符合该配置约束的数值；默认值：4。
raha.resource.max-parallel-strategies=4
# 字段并发处理上限。
# 可选值：符合该配置约束的数值；默认值：4。
raha.resource.max-parallel-columns=4
# 允许广播的对象大小上限，单位为字节。
# 可选值：符合该配置约束的数值；默认值：10485760。
raha.resource.broadcast-threshold-bytes=10485760
# Spark 缓存使用的存储级别。
# 可选值：Spark 支持的存储级别；默认值：MEMORY_AND_DISK。
raha.resource.cache-storage-level=MEMORY_AND_DISK
# 允许缓存的数据大小上限，单位为字节。
# 可选值：符合该配置约束的数值；默认值：536870912。
raha.resource.cache-threshold-bytes=536870912
# 单个阶段超时时间，单位为毫秒。
# 可选值：符合该配置约束的数值；默认值：1800000。
raha.resource.stage-timeout-millis=1800000
# 是否启用单个列批内部的字段特征并行组装。
raha.feature.parallel-enabled=true
# 是否启用单个列批内部的字段本地并行聚类，Spark 聚类器会自动降级串行。
raha.clustering.parallel-enabled=true

# 宽表训练和检测的单个字段批次大小，非正数表示关闭列批。
raha.column-batch.size=10
# 同时执行的列批数量，当前阶段固定为 1。
raha.column-batch.max-parallel=1
# 是否允许在每个列批内部生成 RVD 策略，默认关闭。
raha.column-batch.rvd.enabled=false
# RVD 范围固定为当前列批内部。
raha.column-batch.rvd.scope=IN_BATCH
# 单个列批失败后是否立即停止剩余列批。
raha.column-batch.fail-fast=false
# 是否在出现可恢复失败时立即终止任务。
# 可选值：true、false；默认值：false。
raha.failure.fail-fast=true
# 允许失败的策略数量占比上限。
# 可选值：符合该配置约束的数值；默认值：0.1。
raha.failure.max-failed-strategy-ratio=0.1
# 阶段允许的最大重试次数。
# 可选值：符合该配置约束的数值；默认值：1。
raha.failure.max-retry-count=0
